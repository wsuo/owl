name: Build GoWVP Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wsuo/owl
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build Linux binary
        run: |
          mkdir -p build/linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.gitHash=${GITHUB_SHA}" -o build/linux_amd64/bin ./main.go
      - name: Download pinned web assets
        run: |
          curl --fail --location --retry 3 https://github.com/gowvp/gb28181_web/releases/download/latest/www.zip --output /tmp/www.zip
          echo "e29523cc5c797e531ab9e1f27f6d170378c80effcf605feec1d469f26287295f  /tmp/www.zip" | sha256sum --check
          unzip -q /tmp/www.zip -d .
          test -f www/index.html
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile_zlm
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/wsuo/owl:sha-${{ github.sha }}
            ${{ steps.metadata.outputs.tags }}
